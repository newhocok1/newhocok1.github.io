<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КнигоПоиск — найди книгу по лучшей цене</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Roboto', 'SF Pro', 'Segoe UI', sans-serif;
            background: #FFFFFF;
            color: #111;
            line-height: 1.4;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }

        /* Шапка с заголовком и иконкой поиска */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 16px 12px; position: sticky; top: 0; background: #fff;
            z-index: 10;
        }
        header h1 { font-size: 2.2em; font-weight: 700; }
        .search-icon {
            font-size: 1.8em; cursor: pointer; background: none; border: none;
            color: #333; padding: 8px; line-height: 1;
        }

        /* Скрытая строка поиска */
        .search-box {
            display: none; padding: 0 16px 16px;
        }
        .search-box.visible { display: block; }
        .search-input {
            width: 100%; padding: 12px 16px; font-size: 1em;
            border: 2px solid #ddd; border-radius: 12px; outline: none;
            transition: border 0.3s;
        }
        .search-input:focus { border-color: #2ecc71; }

        /* Жанры */
        .genres {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 8px 16px 16px; scrollbar-width: none; -ms-overflow-style: none;
        }
        .genres::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 18px; border-radius: 20px; font-size: 0.95em;
            font-weight: 500; white-space: nowrap; cursor: pointer;
            background: #F2F2F2; color: #333; border: none;
            transition: background 0.2s;
        }
        .chip.active { background: #2ecc71; color: #fff; }

        /* Разделы */
        .section { padding: 20px 0; }
        .section-title { font-size: 1.5em; font-weight: 700; padding: 0 16px; margin-bottom: 12px; }

        /* Горизонтальная карусель для популярных книг */
        .carousel {
            display: flex; gap: 16px; overflow-x: auto;
            padding: 0 16px 12px; scrollbar-width: thin;
            -ms-overflow-style: auto;
        }
        .carousel::-webkit-scrollbar { height: 4px; }
        .carousel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

        /* Сетка для новинок / результатов поиска */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px; padding: 0 16px 12px;
        }

        /* Карточка книги */
        .book-card {
            background: #F9F9F9; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column;
            transition: transform 0.2s;
        }
        .book-card:hover { transform: translateY(-3px); }
        .book-cover {
            width: 100%; height: 220px; object-fit: cover;
            background: #E0E0E0; display: flex; align-items: center;
            justify-content: center; color: #aaa; font-size: 2em;
        }
        .book-info { padding: 10px 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .book-title {
            font-size: 0.95em; font-weight: 600; margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-author { font-size: 0.8em; color: #666; margin-bottom: 8px; }
        .buy-btn {
            margin-top: auto; text-align: center; padding: 8px; border-radius: 8px;
            font-weight: 600; font-size: 0.85em; text-decoration: none;
            background: #2ecc71; color: #fff; transition: background 0.2s;
        }
        .buy-btn:hover { background: #27ae60; }

        .loading, .no-results { text-align: center; padding: 30px; color: #999; }

        /* Блок приложения */
        .app-block {
            background: #F9F9F9; border-radius: 12px; padding: 20px; margin: 20px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .app-text { font-size: 0.95em; color: #333; }
        .app-btn {
            padding: 10px 20px; border-radius: 8px; font-weight: 600;
            text-decoration: none; background: #2ecc71; color: #fff;
            white-space: nowrap; transition: background 0.2s;
        }
        .app-btn:hover { background: #27ae60; }

        footer { text-align: center; padding: 20px; color: #999; font-size: 0.85em; }
        footer a { color: #999; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header>
            <h1>Книги</h1>
            <button class="search-icon" onclick="toggleSearch()">🔍</button>
        </header>

        <!-- Поиск -->
        <div class="search-box" id="searchBox">
            <input type="text" class="search-input" id="searchInput" placeholder="Название книги или автор..." autocomplete="off">
        </div>

        <!-- Жанры -->
        <div class="genres" id="genresBlock">
            <button class="chip active" data-genre="all">Все книги</button>
            <button class="chip" data-genre="free">Бесплатно</button>
            <button class="chip" data-genre="comics">Комиксы</button>
            <button class="chip" data-genre="romance">Романтика</button>
            <button class="chip" data-genre="classic">Классика</button>
            <button class="chip" data-genre="psychology">Психология</button>
        </div>

        <!-- Контент -->
        <div id="dynamicContent"></div>

        <!-- Блок приложения -->
        <div class="app-block">
            <span class="app-text">📱 Читайте книги даже без интернета</span>
            <a href="#" class="app-btn">Открыть</a>
        </div>

        <footer>
            <a href="#">Открыть в приложении</a><br>
            books.yandex.ru
        </footer>
    </div>

    <script>
        // Конфигурация
        const PARTNER_CODE = "027506d3";
        const LITRES_SEARCH = `https://www.litres.ru/search/?q=`;

        // Элементы
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');
        const dynamicContent = document.getElementById('dynamicContent');

        // Поиск
        function toggleSearch() {
            searchBox.classList.toggle('visible');
            if (searchBox.classList.contains('visible')) {
                searchInput.focus();
            } else {
                searchInput.value = '';
                loadMainContent(); // Возвращаем главную страницу
            }
        }

        // Загрузка главной страницы
        function loadMainContent() {
            dynamicContent.innerHTML = `
                <div class="section">
                    <div class="section-title">Популярное</div>
                    <div class="carousel" id="popularCarousel">
                        <div class="loading">Загрузка...</div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-title">Новинки</div>
                    <div class="books-grid" id="newBooksGrid">
                        <div class="loading">Загрузка...</div>
                    </div>
                </div>
            `;
            fetchBooks('популярные книги', 'popularCarousel', 'carousel');
            fetchBooks('новинки книг', 'newBooksGrid', 'grid');
        }

        // Поиск книг
        searchInput.addEventListener('input', function() {
            const query = this.value.trim();
            if (query.length < 2) {
                if (query.length === 0) loadMainContent();
                return;
            }
            dynamicContent.innerHTML = `
                <div class="section">
                    <div class="section-title">Результаты поиска</div>
                    <div class="books-grid" id="searchResultsGrid">
                        <div class="loading">Ищем книги...</div>
                    </div>
                </div>
            `;
            fetchBooks(query, 'searchResultsGrid', 'grid');
        });

        // Универсальная функция загрузки книг
        function fetchBooks(query, containerId, viewType) {
            const container = document.getElementById(containerId);
            if (!container) return;

            let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=20&langRestrict=ru`;
            
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (!data.items || data.items.length === 0) {
                        container.innerHTML = '<div class="no-results">Книги не найдены</div>';
                        return;
                    }
                    displayBooks(data.items, container, viewType);
                })
                .catch(() => {
                    container.innerHTML = '<div class="no-results">Ошибка загрузки</div>';
                });
        }

        // Отображение книг
        function displayBooks(items, container, viewType) {
            container.innerHTML = '';
            items.forEach(item => {
                const info = item.volumeInfo;
                const title = info.title || 'Без названия';
                const authors = info.authors ? info.authors.join(', ') : 'Автор не указан';
                const cover = info.imageLinks ? info.imageLinks.thumbnail : null;
                const litresUrl = LITRES_SEARCH + encodeURIComponent(title + ' ' + authors) + '&utm_source=advcake&utm_medium=cpa&utm_campaign=affiliate&utm_content=' + PARTNER_CODE;

                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    ${cover ? `<img src="${cover}" alt="${title}" class="book-cover">` : '<div class="book-cover">📖</div>'}
                    <div class="book-info">
                        <div class="book-title">${title}</div>
                        <div class="book-author">${authors}</div>
                        <a href="${litresUrl}" target="_blank" rel="noopener" class="buy-btn">Купить на ЛитРес</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Жанровые чипсы
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelector('.chip.active')?.classList.remove('active');
                this.classList.add('active');
                const genre = this.dataset.genre;
                if (genre === 'all') {
                    loadMainContent();
                } else {
                    dynamicContent.innerHTML = `
                        <div class="section">
                            <div class="section-title">${this.textContent}</div>
                            <div class="books-grid" id="genreBooksGrid">
                                <div class="loading">Загрузка...</div>
                            </div>
                        </div>
                    `;
                    fetchBooks(genre, 'genreBooksGrid', 'grid');
                }
            });
        });

        // Старт
        loadMainContent();
    </script>
</body>
</html>
