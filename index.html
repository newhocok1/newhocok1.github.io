
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КнигоПоиск — найди книгу по лучшей цене</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f9f9f9; color: #222; min-height: 100vh; }
        /* Тёмная тема */
        body.dark { background: #1a1a1a; color: #eee; }
        body.dark .book-card { background: #2a2a2a; }
        body.dark .book-author { color: #aaa; }
        body.dark .search-box input { background: #333; color: #fff; border-color: #555; }
        body.dark .filter-btn { background: #333; color: #ccc; border-color: #555; }
        body.dark .filter-btn.active { background: #3498db; color: #fff; border-color: #3498db; }

        header { background: linear-gradient(135deg, #2c3e50, #3498db); padding: 40px 20px; text-align: center; color: white; position: relative; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }

        .theme-toggle { position: absolute; top: 15px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
        .theme-toggle:hover { background: rgba(255,255,255,0.3); }

        .search-box { max-width: 500px; margin: 30px auto; padding: 0 20px; position: relative; }
        .search-box input { width: 100%; padding: 15px 45px 15px 20px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 30px; outline: none; transition: border 0.3s; }
        .search-box input:focus { border-color: #3498db; }
        .search-box .clear-btn { position: absolute; right: 30px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999; display: none; }
        .search-box .clear-btn.visible { display: block; }

        .history { max-width: 600px; margin: 0 auto 20px; padding: 0 20px; text-align: center; }
        .history span { color: #999; font-size: 0.9em; }
        .history a { color: #3498db; margin: 0 8px; cursor: pointer; text-decoration: none; }
        .history a:hover { text-decoration: underline; }

        .filters { max-width: 600px; margin: 0 auto 20px; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.9em; transition: all 0.3s; }
        .filter-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        .filter-btn:hover { border-color: #3498db; }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .book-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; display: flex; flex-direction: column; }
        .book-card:hover { transform: translateY(-5px); }
        .book-cover { width: 100%; height: 260px; object-fit: cover; background: #eee; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 2em; }
        .book-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .book-title { font-size: 1em; font-weight: bold; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-author { color: #666; font-size: 0.85em; margin-bottom: 10px; }
        .book-price { color: #27ae60; font-size: 1.2em; font-weight: bold; margin-top: auto; margin-bottom: 12px; }
        .buy-btn { display: block; text-align: center; padding: 12px; background: #2ecc71; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: background 0.3s; }
        .buy-btn:hover { background: #27ae60; }
        .loading, .no-results, .error { text-align: center; padding: 50px; color: #999; }
        .error { color: #e74c3c; }
        footer { text-align: center; padding: 30px; color: #999; font-size: 0.9em; }
        footer a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>
        <h1>📚 КнигоПоиск</h1>
        <p>Найдите любую книгу и перейдите по лучшей цене</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введите название книги или автора..." autocomplete="off">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>

    <div class="history" id="history"></div>
    <div class="filters" id="filters" style="display:none;"></div>
    <div id="booksContainer" class="books-grid"></div>
    <footer>
        <p>По вопросам: <a href="https://t.me/HELP_SHOP_HOCKA" target="_blank">@HELP_SHOP_HOCKA</a></p>
    </footer>

    <script>
        // ========== НАСТРОЙКИ ==========
        const PARTNER_CODE = "027506d3"; // Твой партнёрский код ЛитРес
        const LITRES_SEARCH = `https://www.litres.ru/search/?q=`;

        // ========== ЭЛЕМЕНТЫ ==========
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const booksContainer = document.getElementById('booksContainer');
        const filtersDiv = document.getElementById('filters');
        const historyDiv = document.getElementById('history');

        // ========== ИСТОРИЯ ПОИСКА ==========
        let searchHistory = JSON.parse(localStorage.getItem('bookSearchHistory') || '[]');

        function saveToHistory(query) {
            searchHistory = searchHistory.filter(q => q.toLowerCase() !== query.toLowerCase());
            searchHistory.unshift(query);
            if (searchHistory.length > 5) searchHistory.pop();
            localStorage.setItem('bookSearchHistory', JSON.stringify(searchHistory));
            renderHistory();
        }

        function renderHistory() {
            if (searchHistory.length === 0) { historyDiv.innerHTML = ''; return; }
            historyDiv.innerHTML = '<span>🕐 Недавно искали:</span> ' + searchHistory.map(q => `<a onclick="searchFromHistory('${q}')">${q}</a>`).join('');
        }

        function searchFromHistory(query) {
            searchInput.value = query;
            clearBtn.classList.add('visible');
            searchBooks(query);
        }

        function clearSearch() {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            filtersDiv.style.display = 'none';
            loadPopularBooks();
        }

        // ========== ТЁМНАЯ ТЕМА ==========
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // ========== ПОИСК ==========
        let debounceTimer;
        searchInput.addEventListener('input', function() {
            const query = this.value.trim();
            if (query.length > 0) clearBtn.classList.add('visible'); else clearBtn.classList.remove('visible');
            clearTimeout(debounceTimer);
            if (query.length < 2) {
                if (query.length === 0) { filtersDiv.style.display = 'none'; loadPopularBooks(); }
                return;
            }
            debounceTimer = setTimeout(() => searchBooks(query), 400);
        });

        function searchBooks(query) {
            saveToHistory(query);
            booksContainer.innerHTML = '<div class="loading">🔍 Ищем книги...</div>';
            filtersDiv.style.display = 'flex';
            filtersDiv.innerHTML = `
                <button class="filter-btn active" onclick="applyFilter('all', '${query}')">Все</button>
                <button class="filter-btn" onclick="applyFilter('ru', '${query}')">🇷🇺 Русские</button>
                <button class="filter-btn" onclick="applyFilter('free', '${query}')">🆓 Бесплатные</button>
                <button class="filter-btn" onclick="applyFilter('new', '${query}')">🆕 Новые</button>
            `;
            fetchBooks(query);
        }

        function applyFilter(filter, query) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            fetchBooks(query, filter);
        }

        function fetchBooks(query, filter = 'all') {
            let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=20`;
            if (filter === 'ru') url += '&langRestrict=ru';
            if (filter === 'free') url += '&filter=free-ebooks';
            if (filter === 'new') url += '&orderBy=newest';

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (!data.items || data.items.length === 0) {
                        booksContainer.innerHTML = '<div class="no-results">😕 Ничего не найдено</div>';
                        return;
                    }
                    displayBooks(data.items);
                })
                .catch(() => booksContainer.innerHTML = '<div class="error">❌ Ошибка загрузки</div>');
        }

        function displayBooks(items) {
            booksContainer.innerHTML = '';
            items.forEach(item => {
                const info = item.volumeInfo;
                const title = info.title || 'Без названия';
                const authors = info.authors ? info.authors.join(', ') : 'Автор не указан';
                const cover = info.imageLinks ? info.imageLinks.thumbnail : null;
                const litresUrl = LITRES_SEARCH + encodeURIComponent(title + ' ' + authors) + '&utm_source=advcake&utm_medium=cpa&utm_campaign=affiliate&utm_content=' + PARTNER_CODE;

                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    ${cover ? `<img src="${cover}" alt="${title}" class="book-cover">` : '<div class="book-cover">📖</div>'}
                    <div class="book-info">
                        <div class="book-title">${title}</div>
                        <div class="book-author">${authors}</div>
                        <div class="book-price">💰 Узнать цену</div>
                        <a href="${litresUrl}" target="_blank" rel="noopener" class="buy-btn">Купить на ЛитРес</a>
                    </div>
                `;
                booksContainer.appendChild(card);
            });
        }

        function loadPopularBooks() {
            booksContainer.innerHTML = '<div class="loading">📚 Загружаем популярные книги...</div>';
            fetch('https://www.googleapis.com/books/v1/volumes?q=subject:fiction&langRestrict=ru&maxResults=12&orderBy=relevance')
                .then(r => r.json())
                .then(data => { if (data.items) displayBooks(data.items); else booksContainer.innerHTML = '<div class="no-results">Книги не найдены</div>'; })
                .catch(() => booksContainer.innerHTML = '<div class="error">❌ Ошибка загрузки</div>');
        }

        // ========== ЗАПУСК ==========
        renderHistory();
        loadPopularBooks();
    </script>
</body>
</html>
